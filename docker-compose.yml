# Local development Postgres for Grappledex.
#   docker compose up -d      # start (data persists in the named volume)
#   npm run db:migrate        # apply Drizzle migrations
#   npm run db:seed           # load the demo slice
#   docker compose down       # stop  (add -v to also wipe the volume)
services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grappledex
      POSTGRES_PASSWORD: grappledex
      POSTGRES_DB: grappledex
    volumes:
      - grappledex-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grappledex -d grappledex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  grappledex-pgdata:
