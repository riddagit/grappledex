# Local development Postgres for RollVault.
#   docker compose up -d      # start (data persists in the named volume)
#   npm run db:migrate        # apply Drizzle migrations
#   npm run db:seed           # load the demo slice
#   docker compose down       # stop  (add -v to also wipe the volume)
services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rollvault
      POSTGRES_PASSWORD: rollvault
      POSTGRES_DB: rollvault
    volumes:
      - rollvault-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rollvault -d rollvault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rollvault-pgdata:
